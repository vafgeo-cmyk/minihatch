<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MINI SE Charging Calculator</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="MINI Charge">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0a;--card:#111;--border:#222;--accent:#c8f135;--accent2:#3df5c1;--text:#f0f0f0;--muted:#666}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:'DM Mono',monospace;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
.container{width:100%;max-width:420px}
.header{margin-bottom:32px}
.header h1{font-family:'Syne',sans-serif;font-size:2rem;font-weight:800;line-height:1;letter-spacing:-1px;color:var(--accent)}
.header p{color:var(--muted);font-size:.75rem;margin-top:6px;letter-spacing:.05em}
.card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:28px;margin-bottom:16px}
.field{margin-bottom:24px}.field:last-child{margin-bottom:0}
label{display:block;font-size:.7rem;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-bottom:12px}
.slider-value{font-family:'Syne',sans-serif;font-size:2.5rem;font-weight:700;color:var(--text);margin-bottom:8px;line-height:1}
.slider-value span{font-size:1rem;color:var(--muted);font-family:'DM Mono',monospace;font-weight:300}
input[type=range]{-webkit-appearance:none;width:100%;height:4px;background:var(--border);border-radius:2px;outline:none;cursor:pointer}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:20px;height:20px;border-radius:50%;background:var(--accent);cursor:pointer;box-shadow:0 0 12px rgba(200,241,53,.4);transition:box-shadow .2s}
input[type=range]::-webkit-slider-thumb:hover{box-shadow:0 0 20px rgba(200,241,53,.7)}
#desiredSlider::-webkit-slider-thumb{background:var(--accent2);box-shadow:0 0 12px rgba(61,245,193,.4)}
#desiredSlider::-webkit-slider-thumb:hover{box-shadow:0 0 20px rgba(61,245,193,.7)}
.battery-visual{width:100%;height:32px;background:#1a1a1a;border-radius:6px;margin-top:14px;position:relative;overflow:hidden;border:1px solid var(--border)}
.battery-target{position:absolute;left:0;top:0;height:100%;background:linear-gradient(90deg,#003a2a,var(--accent2));border-radius:6px;transition:width .3s ease;opacity:.35}
.battery-current{position:absolute;left:0;top:0;height:100%;background:linear-gradient(90deg,#2a4a00,var(--accent));border-radius:6px;transition:width .3s ease;opacity:.6}
.battery-label{position:absolute;top:50%;transform:translateY(-50%);font-size:.65rem;letter-spacing:.1em;font-weight:500;z-index:2}
.battery-label.current{left:8px;color:var(--accent)}.battery-label.target{right:8px;color:var(--accent2)}
.result-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:28px;position:relative;overflow:hidden}
.result-card::before{content:'';position:absolute;top:-40px;right:-40px;width:120px;height:120px;background:radial-gradient(circle,rgba(200,241,53,.08) 0%,transparent 70%);pointer-events:none}
.result-label{font-size:.7rem;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-bottom:8px}
.result-time{font-family:'Syne',sans-serif;font-size:3.5rem;font-weight:800;line-height:1;letter-spacing:-2px;color:var(--accent)}
.result-time.error{font-size:1.2rem;color:#f55;letter-spacing:-.5px}
.result-sub{font-size:.72rem;color:var(--muted);margin-top:16px;padding-top:16px;border-top:1px solid var(--border);line-height:1.9}
.result-sub strong{color:var(--text)}
.finish-time{margin-top:8px;font-size:.72rem;color:var(--accent2)}
.dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--accent);margin-right:6px;vertical-align:middle}
.dot.accent2{background:var(--accent2)}
.footer{text-align:center;font-size:.65rem;color:#333;margin-top:16px;letter-spacing:.08em}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>MINI SE<br>CHARGE CALC</h1>
    <p>2022 · 28.9 kWh · 6.19 kW real-world rate</p>
  </div>
  <div class="card">
    <div class="field">
      <label><span class="dot"></span>Current battery %</label>
      <div class="slider-value" id="currentDisplay">62 <span>%</span></div>
      <input type="range" id="currentSlider" min="1" max="99" value="62">
    </div>
    <div class="field">
      <label><span class="dot accent2"></span>Desired battery %</label>
      <div class="slider-value" id="desiredDisplay" style="color:var(--accent2)">80 <span>%</span></div>
      <input type="range" id="desiredSlider" min="2" max="100" value="80">
      <div class="battery-visual">
        <div class="battery-target" id="batteryTarget"></div>
        <div class="battery-current" id="batteryCurrent"></div>
        <div class="battery-label current">NOW</div>
        <div class="battery-label target">TARGET</div>
      </div>
    </div>
  </div>
  <div class="result-card">
    <div class="result-label">estimated charge time</div>
    <div class="result-time" id="resultTime">—</div>
    <div class="result-sub" id="resultSub"></div>
  </div>
  <div class="footer">calibrated to your session · 13 kWh in 2h 06m · 6.75p/kWh</div>
</div>
<script>
const BATTERY_KWH=28.9,CHARGE_RATE_KW=13/(126/60);
const currentSlider=document.getElementById('currentSlider'),desiredSlider=document.getElementById('desiredSlider'),currentDisplay=document.getElementById('currentDisplay'),desiredDisplay=document.getElementById('desiredDisplay'),resultTime=document.getElementById('resultTime'),resultSub=document.getElementById('resultSub'),batteryCurrent=document.getElementById('batteryCurrent'),batteryTarget=document.getElementById('batteryTarget');
function formatTime(h){const hrs=Math.floor(h),mins=Math.round((h-hrs)*60);if(hrs===0)return mins+'m';if(mins===0)return hrs+'h';return hrs+'h '+String(mins).padStart(2,'0')+'m'}
function getFinishTime(h){const n=new Date();n.setMinutes(n.getMinutes()+Math.round(h*60));return n.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'})}
function calculate(){
  const cur=parseInt(currentSlider.value),des=parseInt(desiredSlider.value);
  currentDisplay.innerHTML=cur+' <span>%</span>';
  desiredDisplay.innerHTML=des+' <span>%</span>';
  batteryCurrent.style.width=cur+'%';
  batteryTarget.style.width=Math.max(cur,des)+'%';
  if(des<=cur){resultTime.className='result-time error';resultTime.textContent='already there';resultSub.innerHTML='Battery is already at or above target.<br>No charging needed!';return}
  resultTime.className='result-time';
  const pct=des-cur,kwh=(pct/100)*BATTERY_KWH,hrs=kwh/CHARGE_RATE_KW,cost=kwh*6.75,miles=Math.round(pct*1.18);
  resultTime.textContent=formatTime(hrs);
  resultSub.innerHTML='<strong>+'+pct+'%</strong> needed &nbsp;·&nbsp; <strong>'+kwh.toFixed(1)+' kWh</strong><br>Cost at 6.75p/kWh: <strong>£'+(cost/100).toFixed(2)+'</strong><br>Range added: <strong>~'+miles+' miles</strong><div class="finish-time">⏱ plug in now → done by <strong>'+getFinishTime(hrs)+'</strong></div>';
}
currentSlider.addEventListener('input',calculate);
desiredSlider.addEventListener('input',calculate);
calculate();
</script>
</body>
</html>
