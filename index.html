<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MINI SE Charge</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="MINI Charge">
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'%3E%3Crect width='180' height='180' rx='40' fill='%230a0a0a'/%3E%3Crect x='20' y='20' width='140' height='140' rx='28' fill='%23111'/%3E%3Ctext x='90' y='72' font-family='Arial Black,sans-serif' font-size='28' font-weight='900' fill='%23c8f135' text-anchor='middle'%3EMINI%3C/text%3E%3Crect x='30' y='82' width='120' height='16' rx='8' fill='%23222'/%3E%3Crect x='30' y='82' width='75' height='16' rx='8' fill='%23c8f135'/%3E%3Ctext x='90' y='130' font-family='Arial,sans-serif' font-size='18' font-weight='700' fill='%233df5c1' text-anchor='middle'%3ECHARGE%3C/text%3E%3Ctext x='90' y='152' font-family='Arial,sans-serif' font-size='13' fill='%23666' text-anchor='middle'%3ECALCULATOR%3C/text%3E%3C/svg%3E">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0a;
    --card: #111111;
    --border: #222222;
    --accent: #c8f135;
    --accent2: #3df5c1;
    --text: #f0f0f0;
    --muted: #666;
    --battery-empty: #1a1a1a;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }

  .container {
    width: 100%;
    max-width: 420px;
  }

  .header {
    margin-bottom: 32px;
  }

  .header h1 {
    font-family: 'Syne', sans-serif;
    font-size: 2rem;
    font-weight: 800;
    line-height: 1;
    letter-spacing: -1px;
    color: var(--accent);
  }

  .header p {
    color: var(--muted);
    font-size: 0.75rem;
    margin-top: 6px;
    letter-spacing: 0.05em;
  }

  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 28px;
    margin-bottom: 16px;
  }

  .field {
    margin-bottom: 24px;
  }

  .field:last-child { margin-bottom: 0; }

  label {
    display: block;
    font-size: 0.7rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 12px;
  }

  .slider-value {
    font-family: 'Syne', sans-serif;
    font-size: 2.5rem;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 8px;
    line-height: 1;
  }

  .slider-value span {
    font-size: 1rem;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-weight: 300;
  }

  input[type="range"] {
    -webkit-appearance: none;
    width: 100%;
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    outline: none;
    cursor: pointer;
  }

  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 20px;
    height: 20px;
    border-radius: 50%;
    background: var(--accent);
    cursor: pointer;
    box-shadow: 0 0 12px rgba(200, 241, 53, 0.4);
    transition: box-shadow 0.2s;
  }

  input[type="range"]::-webkit-slider-thumb:hover {
    box-shadow: 0 0 20px rgba(200, 241, 53, 0.7);
  }

  #desiredSlider::-webkit-slider-thumb {
    background: var(--accent2);
    box-shadow: 0 0 12px rgba(61, 245, 193, 0.4);
  }

  #desiredSlider::-webkit-slider-thumb:hover {
    box-shadow: 0 0 20px rgba(61, 245, 193, 0.7);
  }

  .battery-visual {
    width: 100%;
    height: 32px;
    background: var(--battery-empty);
    border-radius: 6px;
    margin-top: 14px;
    position: relative;
    overflow: hidden;
    border: 1px solid var(--border);
  }

  .battery-current {
    position: absolute;
    left: 0;
    top: 0;
    height: 100%;
    background: linear-gradient(90deg, #2a4a00, var(--accent));
    border-radius: 6px;
    transition: width 0.3s ease;
    opacity: 0.6;
  }

  .battery-target {
    position: absolute;
    left: 0;
    top: 0;
    height: 100%;
    background: linear-gradient(90deg, #003a2a, var(--accent2));
    border-radius: 6px;
    transition: width 0.3s ease;
    opacity: 0.35;
  }

  .battery-label {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    font-size: 0.65rem;
    letter-spacing: 0.1em;
    font-weight: 500;
  }

  .battery-label.current { left: 8px; color: var(--accent); }
  .battery-label.target { right: 8px; color: var(--accent2); }

  .result-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 28px;
    position: relative;
    overflow: hidden;
  }

  .result-card::before {
    content: '';
    position: absolute;
    top: -40px; right: -40px;
    width: 120px; height: 120px;
    background: radial-gradient(circle, rgba(200,241,53,0.08) 0%, transparent 70%);
    pointer-events: none;
  }

  .result-label {
    font-size: 0.7rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 8px;
  }

  .result-time {
    font-family: 'Syne', sans-serif;
    font-size: 3.5rem;
    font-weight: 800;
    line-height: 1;
    letter-spacing: -2px;
    color: var(--accent);
    margin-bottom: 4px;
  }

  .result-time.error {
    font-size: 1.2rem;
    color: #ff5555;
    letter-spacing: -0.5px;
  }

  .result-sub {
    font-size: 0.72rem;
    color: var(--muted);
    margin-top: 16px;
    padding-top: 16px;
    border-top: 1px solid var(--border);
    line-height: 1.9;
  }

  .result-sub strong { color: var(--text); }

  .finish-time {
    margin-top: 8px;
    font-size: 0.72rem;
    color: var(--accent2);
  }

  .dot {
    display: inline-block;
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--accent);
    margin-right: 6px;
    vertical-align: middle;
  }
  .dot.accent2 { background: var(--accent2); }

  .footer {
    text-align: center;
    font-size: 0.65rem;
    color: #333;
    margin-top: 16px;
    letter-spacing: 0.08em;
  }
</style>
</head>
<body>
<div class="container">

  <div class="header">
    <h1>MINI SE<br>CHARGE CALC</h1>
    <p>2022 · 28.9 kWh · 6.2 kW real-world rate</p>
  </div>

  <div class="card">
    <div class="field">
      <label><span class="dot"></span>Current battery %</label>
      <div class="slider-value" id="currentDisplay">62 <span>%</span></div>
      <input type="range" id="currentSlider" min="1" max="99" value="62">
    </div>

    <div class="field">
      <label><span class="dot accent2"></span>Desired battery %</label>
      <div class="slider-value" id="desiredDisplay" style="color: var(--accent2)">80 <span>%</span></div>
      <input type="range" id="desiredSlider" min="2" max="100" value="80">

      <div class="battery-visual">
        <div class="battery-target" id="batteryTarget"></div>
        <div class="battery-current" id="batteryCurrent"></div>
        <div class="battery-label current">NOW</div>
        <div class="battery-label target">TARGET</div>
      </div>
    </div>
  </div>

  <div class="result-card">
    <div class="result-label">estimated charge time</div>
    <div class="result-time" id="resultTime">—</div>
    <div class="result-sub" id="resultSub"></div>
  </div>

  <div class="footer">calibrated to your session · 13 kWh in 2h 06m · 6.75p/kWh</div>
</div>

<script>
  const BATTERY_KWH = 28.9;
  const CHARGE_RATE_KW = 13 / (126 / 60); // 13kWh in 126 minutes = 6.19 kW

  const currentSlider = document.getElementById('currentSlider');
  const desiredSlider = document.getElementById('desiredSlider');
  const currentDisplay = document.getElementById('currentDisplay');
  const desiredDisplay = document.getElementById('desiredDisplay');
  const resultTime = document.getElementById('resultTime');
  const resultSub = document.getElementById('resultSub');
  const batteryCurrent = document.getElementById('batteryCurrent');
  const batteryTarget = document.getElementById('batteryTarget');

  function formatTime(hours) {
    const h = Math.floor(hours);
    const m = Math.round((hours - h) * 60);
    if (h === 0) return `${m}m`;
    if (m === 0) return `${h}h`;
    return `${h}h ${String(m).padStart(2,'0')}m`;
  }

  function getFinishTime(hours) {
    const now = new Date();
    now.setMinutes(now.getMinutes() + Math.round(hours * 60));
    return now.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' });
  }

  function calculate() {
    const current = parseInt(currentSlider.value);
    const desired = parseInt(desiredSlider.value);

    currentDisplay.innerHTML = `${current} <span>%</span>`;
    desiredDisplay.innerHTML = `${desired} <span>%</span>`;

    batteryCurrent.style.width = `${current}%`;
    batteryTarget.style.width = `${Math.max(current, desired)}%`;

    if (desired <= current) {
      resultTime.className = 'result-time error';
      resultTime.textContent = 'already there';
      resultSub.innerHTML = `Battery is already at or above target.<br>No charging needed!`;
      return;
    }

    resultTime.className = 'result-time';

    const pctNeeded = desired - current;
    const kwhNeeded = (pctNeeded / 100) * BATTERY_KWH;
    const hoursNeeded = kwhNeeded / CHARGE_RATE_KW;
    const costPence = kwhNeeded * 6.75;
    const milesAdded = Math.round(pctNeeded * 1.18); // based on ~118 mile full range

    resultTime.textContent = formatTime(hoursNeeded);
    resultSub.innerHTML = `
      <strong>+${pctNeeded}%</strong> needed &nbsp;·&nbsp; <strong>${kwhNeeded.toFixed(1)} kWh</strong><br>
      Cost at 6.75p/kWh: <strong>£${(costPence / 100).toFixed(2)}</strong><br>
      Range added: <strong>~${milesAdded} miles</strong>
      <div class="finish-time">⏱ plug in now → done by <strong>${getFinishTime(hoursNeeded)}</strong></div>
    `;
  }

  currentSlider.addEventListener('input', calculate);
  desiredSlider.addEventListener('input', calculate);
  calculate();
</script>
</body>
</html>
